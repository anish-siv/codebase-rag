server:
  port: ${PORT:8082}

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration

  application:
    name: codebase-rag
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ragdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
        distance-type: COSINE_DISTANCE

# Shared secret required (as an "X-Admin-Key" header) to call the mutating
# endpoints (/api/ingest, /api/ingest/github, /api/clear). Blank/unset means
# no auth is enforced -- fine for local dev, never leave unset on a public
# deployment. See AdminAuthInterceptor.
app:
  admin-key: ${ADMIN_KEY:}